<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buon Compleanno Amore</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-svh overflow-hidden font-sans antialiased select-none">

    <div class="absolute inset-0 z-0 bg-slate-950 bg-[url('assets/images/bg-cielo.jpg')] bg-cover bg-center bg-no-repeat">
    </div>

    <canvas id="fireworks-canvas" class="absolute inset-0 z-10 pointer-events-none w-full h-full"></canvas>

    <main class="relative z-20 flex flex-col items-center justify-center min-h-svh w-full px-6 text-center">
        
        <div id="countdown-layer" class="flex items-center justify-center transition-all duration-500">
            <span id="countdown-number" class="text-7xl md:text-9xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-amber-500 drop-shadow-glow">
                3
            </span>
        </div>

        <div id="greeting-layer" class="hidden flex-col items-center justify-center space-y-8 max-w-2xl animate-fade-in">
            <h1 class="text-4xl md:text-6xl font-serif italic tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-pink-200 via-amber-200 to-pink-300 drop-shadow-glow py-2">
                Buon Compleanno
            </h1>
            
            <div class="relative w-48 h-48 md:w-64 md:w-64 flex items-center justify-center group animate-float mt-4">
                <div class="absolute -top-4 flex space-x-6 z-30">
                    <div class="candle relative w-2 h-12 bg-gradient-to-t from-pink-400 to-amber-200 rounded-sm">
                        <div class="flame"></div>
                    </div>
                    <div class="candle relative w-2 h-14 bg-gradient-to-t from-amber-200 to-pink-400 rounded-sm -top-2">
                        <div class="flame"></div>
                    </div>
                    <div class="candle relative w-2 h-12 bg-gradient-to-t from-pink-400 to-amber-200 rounded-sm">
                        <div class="flame"></div>
                    </div>
                </div>

                <div class="w-full h-full flex items-center justify-center">
                    <img id="cake-img" src="assets/images/cake.png" alt="Torta di Compleanno" 
                         class="w-full h-full object-contain hidden">
                    <div id="cake-placeholder" class="w-40 h-40 md:w-52 md:h-52 rounded-full border border-dashed border-amber-200/30 flex flex-col items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                        <span class="text-amber-200/60 text-sm italic">✨ Una dolce sorpresa ✨</span>
                    </div>
                </div>
            </div>

            <p class="text-lg md:text-xl font-light tracking-widest text-pink-100/80 animate-pulse mt-6">
                Esprimi un desiderio <span class="text-amber-300">✨</span>
            </p>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
