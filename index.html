<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Buon compleanno amore</title>

  <link rel="stylesheet" href="./output.css" />
  <script src="./script.js" defer></script>
</head>

<body class="min-h-svh overflow-hidden bg-slate-950 text-white">
  <main id="app" class="relative min-h-svh overflow-hidden isolate">
    <div class="sky-bg absolute inset-0 -z-20"></div>
    <div class="sky-vignette absolute inset-0 -z-10"></div>

    <canvas
      id="fireworksCanvas"
      class="pointer-events-none fixed inset-0 z-30 h-full w-full"
      aria-hidden="true"
    ></canvas>

    <div id="starsLayer" class="pointer-events-none absolute inset-0 z-0" aria-hidden="true"></div>

    <div class="moon absolute right-6 top-8 z-10 sm:right-12 sm:top-10 lg:right-24 lg:top-14" aria-hidden="true">
      <div class="moon-core"></div>
    </div>

    <section
      id="introScreen"
      class="relative z-20 flex min-h-svh items-center justify-center px-5 py-10 transition-all duration-700"
    >
      <div class="mx-auto flex w-full max-w-4xl flex-col items-center text-center">
        <p class="mb-5 text-sm uppercase tracking-[0.35em] text-white/55 sm:text-base">
          una piccola sorpresa per te
        </p>

        <div
          id="countdown"
          class="countdown-circle grid size-36 place-items-center rounded-full text-7xl font-black tracking-tight text-white sm:size-44 sm:text-8xl lg:size-52 lg:text-9xl"
          aria-live="polite"
        >
          3
        </div>

        <h1
          id="birthdayTitle"
          class="mt-8 max-w-4xl translate-y-6 text-balance text-5xl font-black leading-[0.95] opacity-0 transition-all duration-1000 sm:text-7xl lg:text-8xl"
        >
          Buon Compleanno
        </h1>

        <p
          id="birthdaySubtitle"
          class="mt-5 max-w-xl translate-y-4 text-base leading-relaxed text-white/70 opacity-0 transition-all duration-1000 sm:text-lg"
        >
          Che questa notte si illumini solo per te.
        </p>
      </div>
    </section>

    <section
      id="cakeScreen"
      class="pointer-events-none absolute inset-0 z-20 flex min-h-svh items-center justify-center px-5 py-10 opacity-0 transition-all duration-1000"
      aria-live="polite"
    >
      <div class="cake-card w-full max-w-xl translate-y-8 scale-95 rounded-[2rem] border border-white/15 px-5 py-8 text-center shadow-2xl transition-all duration-1000 sm:px-10 sm:py-10">
        <p class="mb-6 text-sm uppercase tracking-[0.28em] text-pink-100/70">
          il momento più importante
        </p>

        <div class="relative mx-auto w-full max-w-[340px] sm:max-w-[420px]">
          <div class="candles-row absolute left-1/2 top-0 z-20 flex -translate-x-1/2 -translate-y-6 gap-4 sm:gap-6" aria-hidden="true">
            <span class="candle"><span class="flame"></span></span>
            <span class="candle"><span class="flame"></span></span>
            <span class="candle"><span class="flame"></span></span>
            <span class="candle"><span class="flame"></span></span>
            <span class="candle"><span class="flame"></span></span>
          </div>

          <div class="cake-stage relative grid min-h-[260px] place-items-center sm:min-h-[320px]">
            <img
              id="cakeImage"
              src="./assets/images/cake.png"
              alt="Torta di compleanno"
              class="hidden w-full max-w-[420px] object-contain drop-shadow-[0_35px_45px_rgba(0,0,0,0.35)]"
            />

            <div id="cakeFallback" class="cake-fallback" aria-hidden="true">
              🎂
            </div>
          </div>
        </div>

        <h2 class="mt-4 text-3xl font-black text-white sm:text-4xl">
          Esprimi un desiderio
        </h2>

        <p class="mx-auto mt-3 max-w-md text-sm leading-relaxed text-white/65 sm:text-base">
          Chiudi gli occhi per un secondo. Il resto lo fa la magia.
        </p>
      </div>
    </section>
  </main>
  
</body>

</html>
