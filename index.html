<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buon Compleanno Amore</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-svh overflow-x-hidden font-sans antialiased select-none relative">

    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-[url('assets/images/bg-cielo.jpg')] bg-cover bg-center bg-no-repeat"></div>
        
        <div class="absolute inset-0 bg-slate-950/50 backdrop-blur-[1px]"></div>
    </div>
    <canvas id="fireworks-canvas" class="fixed inset-0 z-10 pointer-events-none w-full h-full"></canvas>

    <main class="relative z-20 w-full">

        <!-- PRIMA SEZIONE: Countdown e Torta -->
        <section id="hero-birthday-section" class="flex flex-col items-center justify-center min-h-svh w-full px-6 text-center">
            <div id="countdown-layer" class="flex items-center justify-center transition-all duration-500">
                <span id="countdown-number" class="text-7xl md:text-9xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-amber-500 drop-shadow-glow">
                    3
                </span>
            </div>

            <div id="greeting-layer" class="hidden flex-col items-center justify-center space-y-8 max-w-2xl animate-fade-in">
                <h1 class="text-4xl md:text-6xl font-serif italic tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-pink-200 via-amber-200 to-pink-300 drop-shadow-glow py-2">
                    Buon Compleanno
                </h1>
                
                <div id="cake-container" class="relative w-48 h-48 md:w-64 flex items-center justify-center group animate-float mt-12 transition-all duration-1000 rounded-full">
                    
                    <div class="absolute -top-4 flex space-x-6 z-30">
                        <div class="candle relative w-2 h-12 bg-gradient-to-t from-sky-700 to-yellow-300 rounded-sm">
                            <div class="flame animate-flame-flicker"></div>
                            <div class="smoke-puff"></div>
                        </div>
                        <div class="candle relative w-2 h-14 bg-gradient-to-t from-yellow-300 to-sky-600 rounded-sm -top-2">
                            <div class="flame animate-flame-flicker" style="animation-delay: 0.2s;"></div>
                            <div class="smoke-puff"></div>
                        </div>
                        <div class="candle relative w-2 h-12 bg-gradient-to-t from-sky-600 to-yellow-300 rounded-sm">
                            <div class="flame animate-flame-flicker" style="animation-delay: 0.4s;"></div>
                            <div class="smoke-puff"></div>
                        </div>
                    </div>

                    <div class="w-full h-full flex items-center justify-center">
                        <img id="cake-img" src="assets/images/cake.png" alt="Torta di Compleanno" class="w-full h-full object-contain hidden">
                        <div id="cake-placeholder" class="w-40 h-40 md:w-52 md:h-52 rounded-full border border-dashed border-amber-200/30 flex flex-col items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                            <span class="text-amber-200/60 text-sm italic">✨ Una dolce sorpresa ✨</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4 min-h-[80px] flex flex-col items-center justify-center">
                    <p id="desire-text" class="text-lg md:text-xl font-light tracking-widest text-pink-100/80 transition-all duration-1000 ease-in-out">
                        Esprimi un desiderio <span class="text-amber-300">✨</span>
                    </p>
                    <p id="romantic-text" class="text-base md:text-lg font-serif italic tracking-wide text-amber-200/0 max-w-md h-0 overflow-hidden transition-all duration-1000 ease-in-out transform translate-y-4"></p>
                </div>

                <div class="relative flex flex-col items-center justify-center min-h-[60px] mt-8 w-full">

                    <button id="blow-button" class="relative px-8 py-3 rounded-full bg-gradient-to-r from-pink-500/20 to-amber-500/20 border border-pink-300/30 text-pink-100 tracking-widest text-sm uppercase transition-all duration-500 hover:from-pink-500/30 hover:to-amber-500/30 hover:border-pink-300/60 hover:scale-105 active:scale-95 focus:outline-none backdrop-blur-md shadow-lg cursor-pointer select-none z-30">
                        Soffia sulle candeline
                    </button>

                    <button id="scroll-to-letter" class="hidden opacity-0 translate-y-4 absolute flex items-center justify-center w-12 h-12 rounded-full border border-yellow-300/20 text-yellow-200/60 transition-all duration-1000 ease-in-out cursor-pointer hover:text-yellow-100 hover:border-yellow-300/50 hover:bg-pink-500/10 focus:outline-none animate-bounce z-20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"></path>
                        </svg>
                    </button>
                    
                </div>

            </div>

        </section>
        
    
    
    
    
    </main>
        

    <script src="script.js"></script>

</body>

</html>
