<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buon Compleanno Amore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-[#1a0a10] text-rose-50 min-h-svh overflow-x-hidden antialiased select-none relative">

    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-[url('assets/images/bg-cielo.jpg')] bg-cover bg-center bg-no-repeat"></div>
        <div class="absolute inset-0 bg-[#1a0a10]/60 backdrop-blur-[1px]"></div>
    </div>
    <canvas id="fireworks-canvas" class="fixed inset-0 z-10 pointer-events-none w-full h-full"></canvas>
    <!-- Canvas dedicato agli effetti delle stelle (palloncini, coriandoli) -->
    <canvas id="effects-canvas" class="fixed inset-0 z-30 pointer-events-none w-full h-full"></canvas>

    <main class="relative z-20 w-full">

        <!-- SEZIONE 1: Countdown, Torta, Candeline, Fuochi -->
        <section id="hero-birthday-section" class="flex flex-col items-center justify-center min-h-svh w-full px-6 text-center">
            <div id="countdown-layer" class="flex items-center justify-center transition-all duration-500">
                <span id="countdown-number" class="text-7xl md:text-9xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-rose-200 to-red-600 drop-shadow-glow font-title">
                    3
                </span>
            </div>

            <div id="greeting-layer" class="hidden flex-col items-center justify-center space-y-8 max-w-2xl animate-fade-in">
                <h1 class="text-5xl md:text-7xl font-title italic tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-rose-200 via-amber-100 to-red-400 drop-shadow-glow py-2">
                    Buon Compleanno
                </h1>

                <div id="cake-container" class="relative w-48 h-48 md:w-64 flex items-center justify-center group animate-float mt-12 transition-all duration-1000 rounded-full">

                    <div class="absolute -top-4 flex space-x-6 z-30">
                        <div class="candle relative w-2 h-12 bg-gradient-to-t from-red-900 to-amber-200 rounded-sm">
                            <div class="flame animate-flame-flicker"></div>
                            <div class="smoke-puff"></div>
                        </div>
                        <div class="candle relative w-2 h-14 bg-gradient-to-t from-amber-200 to-red-800 rounded-sm -top-2">
                            <div class="flame animate-flame-flicker" style="animation-delay: 0.2s;"></div>
                            <div class="smoke-puff"></div>
                        </div>
                        <div class="candle relative w-2 h-12 bg-gradient-to-t from-red-800 to-amber-200 rounded-sm">
                            <div class="flame animate-flame-flicker" style="animation-delay: 0.4s;"></div>
                            <div class="smoke-puff"></div>
                        </div>
                    </div>

                    <div class="w-full h-full flex items-center justify-center">
                        <img id="cake-img" src="assets/images/cake.png" alt="Torta di Compleanno" class="w-full h-full object-contain hidden">
                        <div id="cake-placeholder" class="w-40 h-40 md:w-52 md:h-52 rounded-full border border-dashed border-amber-200/30 flex flex-col items-center justify-center p-4 bg-[#2a0f17]/40 backdrop-blur-sm">
                            <span class="text-amber-100/60 text-sm italic font-title">✨ Una dolce sorpresa ✨</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4 min-h-[80px] flex flex-col items-center justify-center">
                    <p id="desire-text" class="text-lg md:text-xl font-light tracking-widest text-rose-100/80 transition-all duration-1000 ease-in-out">
                        Esprimi un desiderio <span class="text-amber-300">✨</span>
                    </p>
                </div>

                <div class="relative flex flex-col items-center justify-center min-h-[60px] mt-8 w-full">
                    <button id="blow-button" class="relative px-8 py-3 rounded-full bg-gradient-to-r from-red-700/30 to-rose-500/30 border border-rose-300/40 text-rose-50 tracking-widest text-sm uppercase transition-all duration-500 hover:from-red-700/50 hover:to-rose-500/50 hover:border-rose-200/70 hover:scale-105 active:scale-95 focus:outline-none backdrop-blur-md shadow-lg cursor-pointer select-none z-30">
                        Soffia sulle candeline
                    </button>

                    <button id="scroll-to-letter" class="hidden opacity-0 translate-y-4 absolute flex items-center justify-center w-12 h-12 rounded-full border border-amber-200/20 text-amber-100/60 transition-all duration-1000 ease-in-out cursor-pointer hover:text-amber-50 hover:border-amber-200/50 hover:bg-red-700/10 focus:outline-none animate-bounce z-20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- SEZIONE 2: La Lettera (ora prima delle stelle) -->
        <section id="letter-section" class="flex flex-col items-center justify-center min-h-svh w-full px-4 py-16">
            <div class="max-w-2xl w-full">
                <div id="letter-card" class="relative bg-[#2a0f17]/50 backdrop-blur-md border border-amber-200/15 rounded-2xl p-6 sm:p-10 shadow-2xl opacity-0 translate-y-6 transition-all duration-1000 ease-out">

                    <div class="flex items-center justify-center mb-6 space-x-3">
                        <span class="h-px w-8 bg-gradient-to-r from-transparent to-amber-200/50"></span>
                        <span class="text-amber-100/70 text-xs tracking-[0.25em] uppercase font-title italic">A te</span>
                        <span class="h-px w-8 bg-gradient-to-l from-transparent to-amber-200/50"></span>
                    </div>

                    <p id="letter-text" class="text-lg sm:text-xl font-title leading-relaxed text-rose-50/90 min-h-[260px] whitespace-pre-line"></p>
                    <span id="letter-cursor" class="inline-block w-[2px] h-5 bg-amber-200 ml-1 align-middle animate-pulse"></span>

                    <p id="letter-signature" class="mt-6 text-right text-2xl sm:text-3xl font-title italic text-transparent bg-clip-text bg-gradient-to-r from-rose-200 to-amber-100 opacity-0 transition-opacity duration-1000">
                        — con tutto il mio amore
                    </p>

                    <div class="flex justify-center mt-8">
                        <button id="scroll-to-stars-from-letter" class="hidden opacity-0 translate-y-4 flex items-center justify-center w-12 h-12 rounded-full border border-rose-300/30 text-rose-200/70 transition-all duration-1000 cursor-pointer active:scale-90 animate-bounce">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- SEZIONE 3: Il Cielo delle 30 Stelle (ora dopo la lettera) -->
        <section id="stars-section" class="flex flex-col items-center justify-center min-h-svh w-full px-4 py-16">

            <p class="text-amber-100/70 text-xs tracking-[0.25em] uppercase font-title italic mb-2">30 piccole stelle per i tuoi 30 anni</p>
            <p class="text-rose-100/60 text-sm mb-6 font-sans">Accendile tutte ✨</p>

            <div class="mb-6 text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-red-400 font-title">
                <span id="stars-count">00</span><span class="text-amber-200/40">/30</span>
            </div>

            <!-- Area sorpresa centrale (testo, emoji o foto) -->
            <div id="surprise-box" class="min-h-[140px] flex items-center justify-center mb-8 px-4 text-center transition-all duration-500">
                <div id="surprise-content" class="text-lg font-title italic text-rose-50/90"></div>
            </div>

            <!-- Griglia stelle: più distanziata e dita-friendly -->
            <div id="stars-grid" class="grid grid-cols-5 gap-5 sm:gap-6 max-w-sm mx-auto"></div>

            <button id="scroll-to-love" class="hidden opacity-0 translate-y-4 mt-12 flex items-center justify-center w-12 h-12 rounded-full border border-rose-300/30 text-rose-200/70 transition-all duration-1000 cursor-pointer active:scale-90 animate-bounce">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"></path>
                </svg>
            </button>
        </section>

        <!-- SEZIONE 4: Ti Amo + Rosa che sboccia -->
        <section id="love-section" class="flex flex-col items-center justify-center min-h-svh w-full px-4 py-16 overflow-hidden">

            <h2 id="love-title" class="text-6xl sm:text-8xl font-title italic text-transparent bg-clip-text bg-gradient-to-r from-rose-200 via-amber-100 to-red-500 drop-shadow-glow opacity-0 translate-y-6 transition-all duration-1000 ease-out mb-12">
                Ti amo
            </h2>

            <div id="rose-wrap" class="w-48 h-64 sm:w-56 sm:h-72 flex items-end justify-center">
                <svg id="rose-svg" viewBox="0 0 200 280" class="w-full h-full overflow-visible" xmlns="http://www.w3.org/2000/svg">
                    <path id="rose-stem" d="M100 270 C100 220 100 180 100 140" fill="none" stroke="#4d7c4d" stroke-width="4" stroke-linecap="round"/>
                    <path class="rose-leaf" d="M100 210 C70 200 55 215 60 235 C85 232 100 225 100 210 Z" fill="#5a8a5a"/>
                    <path class="rose-leaf" d="M100 185 C130 175 145 190 140 210 C115 207 100 200 100 185 Z" fill="#4d7c4d"/>
                    <g class="rose-bloom">
                        <path class="petal petal-outer" d="M100 140 C70 120 65 90 90 75 C105 90 108 115 100 140 Z" fill="#7f1d1d"/>
                        <path class="petal petal-outer" d="M100 140 C130 120 135 90 110 75 C95 90 92 115 100 140 Z" fill="#7f1d1d"/>
                        <path class="petal petal-outer" d="M100 140 C75 145 55 130 60 105 C82 105 98 118 100 140 Z" fill="#991b1b"/>
                        <path class="petal petal-outer" d="M100 140 C125 145 145 130 140 105 C118 105 102 118 100 140 Z" fill="#991b1b"/>
                    </g>
                    <g class="rose-bloom">
                        <path class="petal petal-mid" d="M100 130 C82 112 82 92 100 85 C118 92 118 112 100 130 Z" fill="#b91c1c"/>
                        <path class="petal petal-mid" d="M100 128 C80 122 72 105 85 92 C100 100 105 115 100 128 Z" fill="#dc2626"/>
                        <path class="petal petal-mid" d="M100 128 C120 122 128 105 115 92 C100 100 95 115 100 128 Z" fill="#dc2626"/>
                    </g>
                    <g class="rose-bloom">
                        <path class="petal petal-core" d="M100 118 C90 108 92 96 100 94 C108 96 110 108 100 118 Z" fill="#ef4444"/>
                        <circle class="petal petal-core" cx="100" cy="106" r="7" fill="#f87171"/>
                    </g>
                </svg>
            </div>

            <p id="love-sub" class="mt-8 text-rose-100/60 text-sm font-title italic tracking-wide opacity-0 transition-opacity duration-1000">
                oggi, domani, sempre
            </p>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
